<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickConnect | Sign in</title>
    <link rel="stylesheet" href="signin.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container main-wrapper">
      <div class="col-lg-8 col-md-10 mx-auto">
        <div class="row split-card g-0">
          <!-- LEFT SIDE -->

          <div class="col-lg-6 brand-side d-flex flex-column justify-content-center">
            <h1>QuickConnect</h1>

            <p>
              Sign up or Sign in to connect instantly, chat with friends and
              build conversations that matter.
            </p>
          </div>

          <!-- RIGHT SIDE -->

          <div class="col-lg-6 form-side text-center">
            <h4 class="text-white mb-4">Welcome Back</h4>

            <form id="loginForm" novalidate>
              <div id="errorBox" class="alert alert-danger d-none"></div>

              <div class="input-group mb-3">
                <input
                id="email"
                  type="email"
                  class="form-control"
                  placeholder="Email address"
                  required
                />
              </div>

              <div class="mb-3">
                <div class="position-relative">
                  <input
                    id="password"
                    type="password"
                    class="form-control"
                    placeholder="Password"
                    required
                  />
                  <i class="bi bi-eye toggle-password"></i>
                </div>
              </div>

              <button id="loginBtn" class="btn btn-login w-100 mb-3">
                Sign In
              </button>
            </form>

            <div class="divider text-center my-3 text-white">
              <hr />
              <span>OR</span>
            </div>

            <button
              id="googleLogin"
              class="btn btn-outline-light google-btn w-100 d-flex align-items-center justify-content-center gap-2"
            >
              <img
                src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                width="18"
              />

              Continue with Google
            </button>

            <div class="signup-link text-center mt-4">
              <span class="text-white-50"> Don't have an account? </span>

              <a href="signup.html" class="signup-btn"> Create Account </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import User from "./user.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCpZlIu_fZ8tm8qlywQGdxZXvx0FRpXquQ",
        authDomain: "chatapp-d3328.firebaseapp.com",
        projectId: "chatapp-d3328",
        storageBucket: "chatapp-d3328.firebasestorage.app",
        messagingSenderId: "3789052159",
        appId: "1:3789052159:web:e7584aaeb9af4e2aa714ca",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const errorBox = document.getElementById("errorBox");

      const toggle = document.querySelector(".toggle-password");
      const passwordInput = document.getElementById("password");

      toggle.addEventListener("click", () => {
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        /* bootstrap validation */

        if (!form.checkValidity()) {
          form.classList.add("was-validated");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        /* disable button */

        loginBtn.disabled = true;
        loginBtn.innerText = "Signing In...";

        signInWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            const user = userCredential.user;

            let currentUser = new User(
              user.displayName || "User",
              user.photoURL,
              user.email
            );

            currentUser.saveUser();

            /* redirect */

            window.location.href = "./index.html";
          })

          .catch((error) => {
            errorBox.classList.remove("d-none");

            if (error.code === "auth/user-not-found") {
              errorBox.innerText = "Account does not exist.";
            } else if (error.code === "auth/wrong-password") {
              errorBox.innerText = "Incorrect username or password.";
            } else {
              errorBox.innerText = "Login failed. Please try again.";
            }

            loginBtn.disabled = false;
            loginBtn.innerText = "Sign In";
          });
      });

      document.getElementById("googleLogin").addEventListener("click", () => {
        signInWithPopup(auth, provider)
          .then((result) => {
            const user = result.user;
            console.log(user);

            let currentUser = new User(
              user.displayName,
              user.photoURL,
              user.email
            );

            currentUser.saveUser();
            window.location.href = "./index.html";
          })
          .catch((error) => {
            console.log(error);
          });
      });
    </script>
  </body>
</html>
