<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickConnect | General Chatpage</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="chatpage.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">QuickConnect</a>

        <div>
          <!-- <div class="online-users" id="onlineUsers"></div> -->
          <div id="profile" class="user-profile">
            <span id="navUserName"></span>

            <img src="" alt="profile" id="profilePic" />
          </div>
        </div>
      </div>
    </nav>

    <div class="chatspace">
      <div class="chat-container" id="chatspace">
        <!-- messages will appear here -->
      </div>
    </div>

    <div id="typingIndicator" class="typing-indicator"></div>

    <div id="replyPreview" class="reply-preview d-none">
      <div>
        <div><span id="replyName"></span></div>
        <div><span id="replyText"></span></div>
      </div>
      <button id="cancelReply"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="chat-input-container">
      <div class="chat-input">
        <input id="messageInput" type="text" placeholder="Type a message..." />

        <button id="sendBtn">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>

    <!-- profile modal -->
    <div class="modal fade" id="profileModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content profile-card">
          <div class="modal-body text-center">
            <img id="modalProfilePic" src="" class="profile-large" />

            <h5 id="userName">User Name</h5>

            <p id="userEmail">user@email.com</p>

            <button class="btn btn-secondary mt-3" id="logoutBtn">
              Logout
            </button>
            <button class="btn btn-danger mt-3" id="deleteBtn">
              Delete Account
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- confirmDelete modal -->
    <div class="modal fade" id="confirmDeleteModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title text-danger">Delete Account</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            Are you sure you want to permanently delete your account? This
            action cannot be undone.
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-danger" id="confirmDeleteBtn">
              Delete Account
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- delete message modal -->
    <div class="modal fade" id="deleteMsgModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body text-center">
            <p>Delete this message?</p>

            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-danger" id="confirmMsgDelete">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- edit message modal -->
    <div class="modal fade" id="editMsgModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Edit Message</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="text" id="editMsgInput" class="form-control" />
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-primary" id="saveEditBtn">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- alert modal -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="appToast" class="toast align-items-center text-bg-dark border-0">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">Message</div>

          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

      import {
        getAuth,
        signOut,
        deleteUser,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

      import {
        getDatabase,
        ref,
        push,
        onValue,
        remove,
        update,
        onDisconnect,
        set,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCpZlIu_fZ8tm8qlywQGdxZXvx0FRpXquQ",
        authDomain: "chatapp-d3328.firebaseapp.com",
        projectId: "chatapp-d3328",
        storageBucket: "chatapp-d3328.firebasestorage.app",
        messagingSenderId: "3789052159",
        appId: "1:3789052159:web:e7584aaeb9af4e2aa714ca",
        databaseURL:
          "https://chatapp-d3328-default-rtdb.europe-west1.firebasedatabase.app",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const database = getDatabase(app);

      const chatSpace = document.getElementById("chatspace");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const currentUser = JSON.parse(localStorage.getItem("user"));

      if (!currentUser) {
        window.location.href = "index.html";
      }

      const userId = currentUser.uid;

      const chatType =
        new URLSearchParams(window.location.search).get("room") || "general";

      document.title = `QuickConnect | ${chatType} Chat`;

      const chatSpaceDiv = document.querySelector(".chatspace");
      chatSpaceDiv.classList.add(chatType);

      const typingRef = ref(database, `typing/${chatType}/${userId}`);

      let typingTimeout;

      messageInput.addEventListener("input", () => {
        set(typingRef, {
          name: currentUser.fullName,
        });

        clearTimeout(typingTimeout);

        typingTimeout = setTimeout(() => {
          remove(typingRef);
        }, 1500);
      });

      const typingListenRef = ref(database, `typing/${chatType}`);

      onValue(typingListenRef, (snapshot) => {
        let typingUsers = [];

        snapshot.forEach((child) => {
          const user = child.val();

          if (user.name !== currentUser.fullName) {
            typingUsers.push(user.name);
          }
        });

        showTyping(typingUsers);
      });

      const logoutBtn = document.getElementById("logoutBtn");

      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          signOut(auth)
            .then(() => {
              localStorage.removeItem("user");

              window.location.href = "landpage.html";
            })
            .catch((error) => {
              console.log(error);

              showToast("Logout failed");
            });
        });
      }

      const deleteBtn = document.getElementById("deleteBtn");
      const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

      if (deleteBtn) {
        deleteBtn.addEventListener("click", () => {
          const profileModalEl = document.getElementById("profileModal");
          const profileModal = bootstrap.Modal.getInstance(profileModalEl);

          if (profileModal) {
            profileModal.hide();
          }

          const deleteModal = new bootstrap.Modal(
            document.getElementById("confirmDeleteModal")
          );

          deleteModal.show();
        });
      }

      if (confirmDeleteBtn) {
        confirmDeleteBtn.addEventListener("click", () => {
          const user = auth.currentUser;

          deleteUser(user)
            .then(() => {
              localStorage.removeItem("user");

              showToast("Account deleted successfully");

              setTimeout(() => {
                window.location.href = "landpage.html";
              }, 700);
            })
            .catch((error) => {
              console.log(error);

              if (error.code === "auth/requires-recent-login") {
                showToast("Please login again to confirm account deletion");

                setTimeout(() => {
                  signOut(auth);
                  localStorage.removeItem("user");
                  window.location.href = "signin.html";
                }, 700);
              } else {
                showToast("Failed to delete account");
              }
            });
        });
      }

      sendBtn.addEventListener("click", sendMessage);

      function sendMessage() {
        const text = messageInput.value.trim();

        if (text === "") return;

        const messagesRef = ref(database, `messages/${chatType}`);

        push(messagesRef, {
          name: currentUser.fullName,
          text: text,
          timestamp: Date.now(),
          photoURL: currentUser.profilePic || "",
          replyTo: replyTo || null,
        });

        messageInput.value = "";

        replyTo = null;
        document.getElementById("replyPreview").classList.add("d-none");
      }

      const messagesRef = ref(database, `messages/${chatType}`);

      function formatTime(ts) {
        const date = new Date(ts);

        let hours = date.getHours();
        let minutes = date.getMinutes();

        const ampm = hours >= 12 ? "PM" : "AM";

        hours = hours % 12 || 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;

        return `${hours}:${minutes} ${ampm}`;
      }

      let messageToEdit = null;
      let messageDataToEdit = null;
      let messageToDelete = null;
      let replyTo = null;

      onValue(messagesRef, (snapshot) => {
        chatSpace.innerHTML = "";

        snapshot.forEach((childSnapshot) => {
          const msg = childSnapshot.val();
          const msgKey = childSnapshot.key;

          const messageWrapper = document.createElement("div");
          messageWrapper.classList.add("message-wrapper");

          const avatar = document.createElement("img");
          avatar.classList.add("avatar");
          avatar.src =
            msg.photoURL ||
            "https://cdn-icons-png.flaticon.com/512/149/149071.png";

          const messageDiv = document.createElement("div");
          messageDiv.classList.add("message");

          const actions = document.createElement("div");
          actions.classList.add("message-actions");

          actions.innerHTML = `
            <span class="reply-btn"><i class="bi bi-arrow-return-left"></i></span>
            <span class="edit-btn"><i class="bi bi-pencil"></i></span>
            <span class="delete-btn"><i class="bi bi-trash"></i></span>
          `;

          messageDiv.innerHTML = `
            <div class="msg-name">${msg.name}</div>
            ${
              msg.replyTo
                ? `<div class="reply-box">
                    <small>${msg.replyTo.name}</small>
                    <div>${msg.replyTo.text}</div>
                  </div>`
                : ""
            }
            <div class="msg-text">${msg.text}</div>
            <div class="msg-time">
              ${formatTime(msg.timestamp)}
              ${msg.edited ? " • edited" : ""}
            </div>`;
          messageDiv.appendChild(actions);

          messageDiv.addEventListener("click", (e) => {
            e.stopPropagation();

            document.querySelectorAll(".message-actions").forEach((el) => {
              el.style.opacity = "0";
              el.style.pointerEvents = "none";
            });

            actions.style.opacity = "1";
            actions.style.pointerEvents = "auto";
          });

          actions.querySelector(".reply-btn").addEventListener("click", (e) => {
            e.stopPropagation();

            replyTo = {
              text: msg.text,
              name: msg.name,
            };

            const preview = document.getElementById("replyPreview");

            preview.classList.remove("d-none");
            document.getElementById("replyName").textContent = msg.name;
            document.getElementById("replyText").textContent = msg.text;
          });

          actions
            .querySelector(".delete-btn")
            .addEventListener("click", (e) => {
              e.stopPropagation();

              if (msg.name !== currentUser.fullName) return;

              messageToDelete = msgKey;

              const modal = new bootstrap.Modal(
                document.getElementById("deleteMsgModal")
              );
              modal.show();
            });

          actions.querySelector(".edit-btn").addEventListener("click", (e) => {
            e.stopPropagation();

            if (msg.name !== currentUser.fullName) return;

            messageToEdit = msgKey;
            messageDataToEdit = msg;

            document.getElementById("editMsgInput").value = msg.text;

            const modal = new bootstrap.Modal(
              document.getElementById("editMsgModal")
            );
            modal.show();
          });

          if (msg.name !== currentUser.fullName) {
            actions.querySelector(".edit-btn").style.display = "none";
            actions.querySelector(".delete-btn").style.display = "none";
          }

          if (msg.name === currentUser.fullName) {
            messageWrapper.classList.add("self");

            messageWrapper.appendChild(messageDiv);
            messageWrapper.appendChild(avatar);
          } else {
            messageWrapper.appendChild(avatar);
            messageWrapper.appendChild(messageDiv);
          }
          chatSpace.appendChild(messageWrapper);
        });

        // auto scroll to bottom
        chatSpace.scrollTop = chatSpace.scrollHeight;
      });

      const cancelReplyBtn = document.getElementById("cancelReply");

      if (cancelReplyBtn) {
        cancelReplyBtn.addEventListener("click", () => {
          replyTo = null;

          const preview = document.getElementById("replyPreview");
          preview.classList.add("d-none");

          document.getElementById("replyName").textContent = "";
          document.getElementById("replyText").textContent = "";
        });
      }

      const confirmMsgDelete = document.getElementById("confirmMsgDelete");

      if (confirmMsgDelete) {
        confirmMsgDelete.addEventListener("click", () => {
          if (!messageToDelete) return;

          const msgRef = ref(
            database,
            `messages/${chatType}/` + messageToDelete
          );

          remove(msgRef);

          messageToDelete = null;

          const modalEl = document.getElementById("deleteMsgModal");
          const modal = bootstrap.Modal.getInstance(modalEl);
          modal.hide();
        });
      }

      const saveEditBtn = document.getElementById("saveEditBtn");

      if (saveEditBtn) {
        saveEditBtn.addEventListener("click", () => {
          const newText = document.getElementById("editMsgInput").value;

          if (!newText.trim() || !messageToEdit) return;

          const msgRef = ref(database, `messages/${chatType}/` + messageToEdit);

          update(msgRef, {
            ...messageDataToEdit,
            text: newText,
            edited: true,
          });

          const modalEl = document.getElementById("editMsgModal");
          const modal = bootstrap.Modal.getInstance(modalEl);
          modal.hide();

          messageToEdit = null;
          messageDataToEdit = null;
        });
      }

      document.addEventListener("click", () => {
        document.querySelectorAll(".message-actions").forEach((el) => {
          el.style.opacity = "0";
          el.style.pointerEvents = "none";
        });
      });

      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });
    </script>

    <script src="profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
